<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White K logo - colors controlled via CSS -->
  <defs>
    <linearGradient id="ksGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#0ABFBC"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle class="logo-circle" cx="24" cy="24" r="22" fill="url(#ksGrad)"/>
  
  <!-- K letter - white stroke -->
  <path 
    class="logo-stroke" 
    d="M16 14V34M16 24L28 34M16 24L26 14" 
    stroke="white" 
    stroke-width="3.5" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    fill="none"
  />
</svg>
